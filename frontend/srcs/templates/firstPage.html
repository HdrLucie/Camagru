<script>
	document.addEventListener("DOMContentLoaded", function () {
		document.getElementById("welcome").onclick = async function () {
			const token = localStorage.getItem('token');
			if (!token){
				window.location.href = '/connection'
			} else {
				window.location.href ='/gallery'
			}
		}
	});
</script>

<html lang="en">

	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>Camagru</title>
		<link rel="stylesheet" type="text/css" href="/styles/presentation-page.css" />
	</head>
	<body>
	<div class="container">
		<h1>
			<button id="welcome" class="btn-camagru">
				CAMAGRU
			</button>
		</h1>
	</div>
	</body>
</html>
